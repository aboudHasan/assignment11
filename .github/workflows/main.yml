name: Automated Python Tests

on: 
  push:

jobs:
  test-lowest-number:
    name: Run Diff Tests
    runs-on: ubuntu-latest

    steps:
      - name: setting up the repo
        uses: actions/checkout@v4

      - name: setting up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: test 1 with numbers on each line
        run: |
          python3 find_lowest_number.py test_data/test1_input.txt test_data/test1_actual.txt
          diff test_data/test1_expected.txt test_data/test1_actual.txt

      - name: test 2 with a single number
        run: |
          python3 find_lowest_number.py test_data/test2_input.txt test_data/test2_actual.txt
          diff test_data/test2_expected.txt test_data/test2_actual.txt

      - name: test 3 with a blank file
        run: |
          python3 find_lowest_number.py test_data/test3_input.txt test_data/test3_actual.txt
          diff test_data/test3_expected.txt test_data/test3_actual.txt
